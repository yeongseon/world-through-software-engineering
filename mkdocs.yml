site_name: 소프트웨어 엔지니어 관점에서 보는 세상
site_description: 대한민국 시스템과 회사 직군을 소프트웨어 엔지니어링 관점에서 분석하는 프로젝트
site_url: https://yeongseon.github.io/world-through-software-engineering/
repo_url: https://github.com/yeongseon/world-through-software-engineering
repo_name: yeongseon/world-through-software-engineering

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

plugins:
  - search:
      lang: ko

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/world-through-software-engineering

copyright: CC BY-SA 4.0

nav:
  - 홈: index.md
  - 선언문: manifesto.md
  - 방법론: methodology.md
  - 공유 용어 사전: glossary/core.md
  - 대한민국 시스템:
      - 소개: series/korea-systems/README.md
      - 용어 사전: series/korea-systems/glossary.md
      - 정치:
          - 소개: series/korea-systems/politics/README.md
      - 법률:
          - 소개: series/korea-systems/law/README.md
          - 헌법: series/korea-systems/law/system/constitution-as-root-architecture.md
      - 경제:
          - 소개: series/korea-systems/economy/README.md
      - 사회:
          - 소개: series/korea-systems/society/README.md
  - 회사 직군:
      - 소개: series/corporate-functions/README.md
      - 용어 사전: series/corporate-functions/glossary.md
      - PM:
          - 소개: series/corporate-functions/pm/README.md
          - 스프린트 주기를 이터레이션 사이클로: series/corporate-functions/pm/system/sprint-as-iteration-cycle.md
      - 법무:
          - 소개: series/corporate-functions/legal/README.md
          - 계약을 인터페이스로: series/corporate-functions/legal/system/contract-as-interface.md
      - 재무:
          - 소개: series/corporate-functions/finance/README.md
          - 회계를 레이어드 아키텍처로: series/corporate-functions/finance/system/accounting-as-layered-architecture.md
      - HR:
          - 소개: series/corporate-functions/hr/README.md
          - 채용을 파이프라인으로: series/corporate-functions/hr/system/hiring-as-pipeline.md
      - 세일즈:
          - 소개: series/corporate-functions/sales/README.md
          - 영업 파이프라인을 상태 머신으로: series/corporate-functions/sales/system/sales-pipeline-as-state-machine.md
      - 마케팅:
          - 소개: series/corporate-functions/marketing/README.md
          - 고객 세분화를 파티셔닝으로: series/corporate-functions/marketing/system/segmentation-as-partitioning.md
      - 운영:
          - 소개: series/corporate-functions/operations/README.md
          - SOP를 런북으로: series/corporate-functions/operations/system/sop-as-runbook.md
      - 디자인:
          - 소개: series/corporate-functions/design/README.md
          - 디자인 시스템을 컴포넌트 라이브러리로: series/corporate-functions/design/system/design-system-as-component-library.md
  - 시리즈 횡단 주제: topics/README.md
